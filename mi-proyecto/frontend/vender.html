<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vender Producto - Mi Tienda</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <main class="container">
        <nav>
            <ul>
                <li><strong>Mi Tienda</strong></li>
            </ul>
            <ul>
                <li><a href="/mi-cuenta">Mi Panel</a></li>
                <li><a href="/api/logout">Cerrar Sesión</a></li>
            </ul>
        </nav>
        
        <article>
            <h2>Publicar un nuevo producto</h2>
            <form action="/api/productos" method="POST">
                
                <label for="nombre">Nombre del producto:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Bicicleta de montaña">
                
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" name="descripcion" required placeholder="Detalles de tu producto..."></textarea>
                
                <label for="precio">Precio (€):</label>
                <input type="number" id="precio" name="precio" step="0.01" min="0.01" required placeholder="0.00">
                
                <button type="submit">Publicar Producto</button>
            </form>
        </article>
    </main>
</body>
</html>
