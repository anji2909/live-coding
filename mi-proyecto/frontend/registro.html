<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Tienda</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <main class="container">
        <article>
            <h2>Crear una cuenta</h2>
            <form action="/api/registro" method="POST">
                
                <label for="username">Nombre de Usuario:</label>
                <input type="text" id="username" name="username" required placeholder="Ej: angelobaeza">
                
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Tu contraseña secreta">
                
                <button type="submit">Registrarme</button>
            </form>
            <p>¿Ya tienes cuenta? <a href="/login.html">Inicia sesión aquí</a></p>
        </article>
    </main>
</body>
</html>
